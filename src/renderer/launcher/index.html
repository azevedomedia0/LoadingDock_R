<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Loading Dock(r)</title>
    <link rel="stylesheet" href="https://fonts.bunny.net/css?family=cal-sans:600" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir-solid.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span class="logo">
          <img src="../../../App_Icon.png" class="logo-icon" alt="" aria-hidden="true" />
          The Loading Dock(r)
        </span>
        <div class="actions">
          <button id="btn-check-update" class="btn-icon" title="Check for updates" aria-label="Check for updates"><svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 21H4C2.89543 21 2 20.1046 2 19V5C2 3.89543 2.89543 3 4 3H20C21.1046 3 22 3.89543 22 5V12" stroke="white" stroke-width="1.5" stroke-linecap="round"/><path d="M2 7L22 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5.01L5.01 4.99889" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 5.01L8.01 4.99889" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 5.01L11.01 4.99889" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21.6665 16.6667C21.0477 15.097 19.6346 14 17.9903 14C16.2319 14 14.7378 15.2545 14.1969 17" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M19.9952 16.7723H21.4002C21.7316 16.7723 22.0002 16.5036 22.0002 16.1723V14.55" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14.3337 19.3333C14.9525 20.903 16.3657 22 18.01 22C19.7684 22 21.2624 20.7455 21.8033 19" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16.005 19.2277H14.6001C14.2687 19.2277 14.0001 19.4964 14.0001 19.8277V21.45" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <button id="btn-import-registry" class="btn-icon" title="Pull registry" aria-label="Pull registry"><svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 22V2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 16H5C3.89543 16 3 15.1046 3 14L3 10C3 8.89543 3.89543 8 5 8H15C16.1046 8 17 8.89543 17 10V14C17 15.1046 16.1046 16 15 16Z" stroke="white" stroke-width="1.5"/></svg></button>
          <button id="btn-export-registry" class="btn-icon" title="Push registry" aria-label="Push registry"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke-width="1.5"><path d="M3 22L3 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 16H9C7.89543 16 7 15.1046 7 14V10C7 8.89543 7.89543 8 9 8H19C20.1046 8 21 8.89543 21 10V14C21 15.1046 20.1046 16 19 16Z" fill="white" stroke="white" stroke-width="1.5"/></svg></button>
          <button id="btn-add" class="btn-icon" title="Add app" aria-label="Add new Docker app"><svg width="20" height="20" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 22V13M12 13L15.5 16.5M12 13L8.5 16.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 17.6073C21.4937 17.0221 23 15.6889 23 13C23 9 19.6667 8 18 8C18 6 18 2 12 2C6 2 6 6 6 8C4.33333 8 1 9 1 13C1 15.6889 2.50628 17.0221 4 17.6073" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </header>

      <!-- Update notification banner -->
      <div id="update-banner" class="banner banner--update hidden">
        <div class="update-banner__body">
          <strong id="update-banner-title"></strong>
          <span id="update-banner-notes"></span>
        </div>
        <div class="update-banner__progress hidden">
          <div class="progress-bar">
            <div id="update-progress-fill" class="progress-bar__fill" style="width:0%"></div>
          </div>
          <span id="update-progress-label">0%</span>
        </div>
        <div class="update-banner__actions">
          <button id="btn-update-install" class="btn btn--primary btn--sm" aria-label="Install update">Install</button>
          <button id="btn-update-later" class="btn btn--ghost btn--sm" aria-label="Dismiss update notification">Later</button>
        </div>
      </div>

      <div id="docker-warning" class="banner banner--warn hidden">
        <span id="docker-warning-text">Starting Docker — please wait…</span>
      </div>
      <div id="error-banner" class="banner banner--error hidden"></div>
      <div id="welcome-banner" class="banner hidden"></div>

      <div class="toolbar-filters">
        <input
          id="app-search"
          class="search-input"
          type="search"
          placeholder="Search installed apps…"
          autocomplete="off"
        />
<button id="btn-hub" class="btn-hub-toolbar" title="Browse Docker Hub" aria-label="Browse Docker Hub">
          <img src="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/docker.png" alt="" class="btn-hub-toolbar__img" />
          Docker Hub
        </button>
      </div>

      <main class="sections">
        <details id="section-installed" class="section-dropdown" open>
          <summary>Installed</summary>
          <div id="grid" class="app-grid"></div>
        </details>
<details id="section-recommended" class="section-dropdown" open>
          <summary>Recommended Apps</summary>
          <div class="store-panel">
            <div id="store-grid" class="rec-grid"></div>
          </div>
        </details>
      </main>

      <!-- Add modal -->
      <div id="modal-add" class="modal hidden">
        <div class="modal-box">
          <div class="modal-tabs">
            <button class="modal-tab modal-tab--active" data-tab="app" aria-label="Switch to Docker App tab">Docker App</button>
            <button class="modal-tab" data-tab="compose" aria-label="Switch to Docker Compose tab">Docker Compose</button>
          </div>

          <!-- Tab: Docker App -->
          <div id="add-tab-app" class="tab-panel">
            <label>Name <input id="add-name" type="text" placeholder="My App" /></label>
            <label>Docker Image <input id="add-image" type="text" placeholder="nginx:latest" /></label>
            <label>Ports <input id="add-ports" type="text" placeholder="8080:80" /></label>
            <label>Open URL (optional) <input id="add-url" type="text" placeholder="http://localhost:8080" /></label>
            <label>Group <input id="add-group" type="text" placeholder="databases" /></label>
            <label>Tags (comma separated) <input id="add-tags" type="text" placeholder="db, local, backend" /></label>
            <label>Restart Policy
              <select id="add-restart">
                <option value="no">No</option>
                <option value="on-failure">On failure</option>
                <option value="unless-stopped">Unless stopped</option>
              </select>
            </label>
            <label>Healthcheck Command
              <input id="add-health-cmd" type="text" placeholder="curl -f http://localhost || exit 1" />
            </label>
            <div class="split3">
              <label>Interval (s) <input id="add-health-interval" type="number" min="1" placeholder="30" /></label>
              <label>Timeout (s) <input id="add-health-timeout" type="number" min="1" placeholder="5" /></label>
              <label>Retries <input id="add-health-retries" type="number" min="1" placeholder="3" /></label>
            </div>
            <div class="field-section">
              <div class="field-section__header">
                <span>Environment Variables</span>
                <button class="btn btn--ghost btn--xs" id="add-env-add-row" aria-label="Add environment variable">+ Add</button>
              </div>
              <div id="add-env-table" class="kv-table"></div>
            </div>
            <div class="field-section">
              <div class="field-section__header">
                <span>Volumes</span>
                <button class="btn btn--ghost btn--xs" id="add-vol-add-row" aria-label="Add volume mount">+ Add</button>
              </div>
              <div id="add-vol-table" class="vol-table"></div>
            </div>
          </div>

          <!-- Tab: Docker Compose -->
          <div id="add-tab-compose" class="tab-panel hidden">
            <label>Project Name <input id="add-compose-project" type="text" placeholder="my-stack" /></label>
            <label>Compose YAML
              <textarea id="add-compose-yaml" rows="12" placeholder="services:&#10;  web:&#10;    image: nginx:latest&#10;    ports:&#10;      - &quot;8080:80&quot;"></textarea>
            </label>
          </div>

          <div class="modal-actions">
            <button id="btn-add-cancel" class="btn btn--ghost" aria-label="Cancel adding app">Cancel</button>
            <button id="btn-add-confirm" class="btn btn--primary" aria-label="Confirm add app">Add</button>
          </div>
        </div>
      </div>

      <!-- Edit modal -->
      <div id="modal-edit" class="modal hidden">
        <div class="modal-box">
          <h2>Edit Docker App</h2>
          <label>Name <input id="edit-name" type="text" /></label>
          <label>Docker Image <input id="edit-image" type="text" /></label>
          <label>Ports <input id="edit-ports" type="text" /></label>
          <label>Open URL (optional) <input id="edit-url" type="text" /></label>
          <label>Group <input id="edit-group" type="text" /></label>
          <label>Tags (comma separated) <input id="edit-tags" type="text" /></label>
          <label>Restart Policy
            <select id="edit-restart">
              <option value="no">No</option>
              <option value="on-failure">On failure</option>
              <option value="unless-stopped">Unless stopped</option>
            </select>
          </label>
          <label>Healthcheck Command <input id="edit-health-cmd" type="text" /></label>
          <div class="split3">
            <label>Interval (s) <input id="edit-health-interval" type="number" min="1" /></label>
            <label>Timeout (s) <input id="edit-health-timeout" type="number" min="1" /></label>
            <label>Retries <input id="edit-health-retries" type="number" min="1" /></label>
          </div>

          <div class="field-section">
            <div class="field-section__header">
              <span>Environment Variables</span>
              <button class="btn btn--ghost btn--xs" id="edit-env-add-row" aria-label="Add environment variable">+ Add</button>
            </div>
            <div id="edit-env-table" class="kv-table"></div>
          </div>

          <div class="field-section">
            <div class="field-section__header">
              <span>Volumes</span>
              <button class="btn btn--ghost btn--xs" id="edit-vol-add-row" aria-label="Add volume mount">+ Add</button>
            </div>
            <div id="edit-vol-table" class="vol-table"></div>
          </div>

          <div class="modal-actions">
            <button id="btn-edit-delete" class="btn btn--danger" aria-label="Delete this app">Delete</button>
            <button id="btn-edit-cancel" class="btn btn--ghost" aria-label="Cancel editing app">Cancel</button>
            <button id="btn-edit-confirm" class="btn btn--primary" aria-label="Save app changes">Save</button>
          </div>
        </div>
      </div>

      <!-- Docker Hub modal -->
      <div id="modal-hub" class="modal hidden">
        <div class="modal-box modal-box--hub">
          <h2>Docker Hub</h2>
          <div class="hub-toolbar">
            <input id="hub-search" type="text" placeholder="Search images (nginx, postgres, redis...)" />
            <button id="btn-hub-search" class="btn btn--primary" aria-label="Search Docker Hub">Search</button>
            <button id="btn-hub-popular" class="btn btn--ghost" aria-label="Show popular Docker images">Popular</button>
            <button id="btn-hub-close" class="btn btn--ghost" aria-label="Close Docker Hub browser">Close</button>
          </div>
          <div id="hub-status" class="hub-status">Browse popular images</div>
          <div id="hub-grid" class="hub-grid"></div>
          <div id="hub-meta" class="hub-meta hidden"></div>
        </div>
      </div>

      <footer class="settings-bar">
        <label class="settings-bar__item" title="Launch The Loading Dock(r) automatically when you log in">
          <input id="toggle-open-at-login" type="checkbox" />
          Open at Login
        </label>
        <label class="settings-bar__item" title="Restart containers after repeated unhealthy health checks">
          <input id="toggle-auto-restart" type="checkbox" checked />
          Auto-restart on unhealthy
        </label>
<label class="settings-bar__item" title="Release channel for auto-updates">
          Channel
          <select id="release-channel" class="status-filter status-filter--inline">
            <option value="stable">stable</option>
            <option value="beta">beta</option>
          </select>
        </label>
      </footer>

      <input id="registry-import-file" type="file" accept="application/json" class="hidden" />
    </div>
    <script type="module" src="./script.ts"></script>
  </body>
</html>
